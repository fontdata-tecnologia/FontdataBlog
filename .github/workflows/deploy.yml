name: Build & Deploy

# Dispara no push para master (branch padrão deste repositório) ou manualmente.
on:
  push:
    branches: [master]
  workflow_dispatch:

# Permite que o GITHUB_TOKEN publique a imagem no GitHub Container Registry (GHCR).
permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  # GHCR exige nome de imagem em minúsculas.
  IMAGE_NAME: ghcr.io/fontdata-tecnologia/fontdatablog

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login no GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Metadata (tags e labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=long

      - name: Build e push da imagem
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_APP_URL=${{ vars.NEXT_PUBLIC_APP_URL }}
            NEXT_PUBLIC_BLOG_NAME=${{ vars.NEXT_PUBLIC_BLOG_NAME }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    # Só dispara o deploy se o webhook do Coolify estiver configurado nos secrets.
    if: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
    steps:
      - name: Disparar deploy no Coolify
        env:
          COOLIFY_WEBHOOK_URL: ${{ secrets.COOLIFY_WEBHOOK_URL }}
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
        run: |
          if [ -z "$COOLIFY_WEBHOOK_URL" ]; then
            echo "COOLIFY_WEBHOOK_URL não configurado — pulando o deploy."
            echo "Configure os secrets COOLIFY_WEBHOOK_URL e COOLIFY_TOKEN para ativar."
            exit 0
          fi
          echo "Disparando deploy no Coolify..."
          http_code=$(curl -s -o /tmp/resp.txt -w "%{http_code}" \
            --request GET "$COOLIFY_WEBHOOK_URL" \
            --header "Authorization: Bearer $COOLIFY_TOKEN")
          echo "HTTP $http_code"
          cat /tmp/resp.txt
          if [ "$http_code" -ge 400 ]; then
            echo "Falha ao disparar o deploy no Coolify."
            exit 1
          fi
